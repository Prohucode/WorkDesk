services:
  backend:
    build:
      context: ./backend
    container_name: workdesk-backend
    command: npm run dev
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://workdesk:workdesk@postgres:5432/workdesk
      SESSION_SECRET: workdesk-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: workdesk-frontend
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: workdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workdesk
      POSTGRES_USER: workdesk
      POSTGRES_PASSWORD: workdesk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workdesk -d workdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
